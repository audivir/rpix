name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-cross-image:
    name: Build ${{ matrix.name }} cross image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kv-linux-arm64
            platform: linux/amd64
          - name: kv-linux-amd64
            platform: linux/amd64
    outputs:
      image: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}-cross:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push multi-arch Docker image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}-cross:latest \
            -f Dockerfile.${{ matrix.name }} \
            --push .

  build:
    name: Build ${{ matrix.name }}
    needs: build-cross-image
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
            name: kv-linux-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
            name: kv-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
            name: kv-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
            name: kv-darwin-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install libheif on macOS
        if: runner.os == 'macOS'
        run: |
          brew install cmake nasm git x265 libde265 pkg-config
          git clone https://github.com/strukturag/libheif.git /tmp/libheif
          cd /tmp/libheif
          git checkout v1.17.0
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Setup Cross.toml to use GHCR image for Linux targets
      - name: Configure Cross
        if: matrix.use-cross
        run: |
          mkdir -p .cargo
          echo "[target.x86_64-unknown-linux-gnu]" >> .cargo/Cross.toml
          echo "image = \"${{ needs.build-cross-image.outputs.image }}\"" >> .cargo/Cross.toml
          echo "[target.aarch64-unknown-linux-gnu]" >> .cargo/Cross.toml
          echo "image = \"${{ needs.build-cross-image.outputs.image }}\"" >> .cargo/Cross.toml

      - name: Build Binary
        shell: bash
        run: |
          BUILDER="cargo"
          if [ "${{ matrix.use-cross }}" = "true" ]; then BUILDER="cross"; fi

          $BUILDER build --release --target ${{ matrix.target }}

          BIN_NAME="kv"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then BIN_NAME="kv.exe"; fi

          mkdir -p ./dist
          cp target/${{ matrix.target }}/release/$BIN_NAME ./dist/${{ matrix.name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: all-dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-dist/*
